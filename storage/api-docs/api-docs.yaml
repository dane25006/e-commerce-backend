openapi: 3.0.0
info:
  title: 'My API Documentation'
  description: 'Complete API documentation for the E-commerce platform covering authentication, products, categories, cart, wishlist, orders, reviews, and promotions.'
  contact:
    email: admin@example.com
  license:
    name: MIT
    url: 'https://opensource.org/licenses/MIT'
  version: 1.0.0
servers:
  -
    url: 'http://localhost:8000'
    description: 'API Server'
paths:
  /api/register:
    post:
      tags:
        - Authentication
      summary: 'Register a new user'
      description: 'Create a new user account and return an API token'
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - name
                - email
                - password
                - password_confirmation
              properties:
                name:
                  type: string
                  example: 'John Doe'
                email:
                  type: string
                  format: email
                  example: john@example.com
                password:
                  type: string
                  format: password
                  example: password123
                password_confirmation:
                  type: string
                  format: password
                  example: password123
              type: object
      responses:
        201:
          description: 'User registered successfully'
          content:
            application/json:
              schema:
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Register Successfully'
                  token:
                    type: string
                    example: 1|abc123def456...
                  user:
                    $ref: '#/components/schemas/User'
                type: object
        422:
          description: 'Validation error'
          content:
            application/json:
              schema:
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'Validation Error'
                  errors:
                    type: object
                type: object
  /api/login:
    post:
      tags:
        - Authentication
      summary: 'Login user'
      description: 'Authenticate a user and return an API token'
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: john@example.com
                password:
                  type: string
                  format: password
                  example: password123
              type: object
      responses:
        200:
          description: 'Login successful'
          content:
            application/json:
              schema:
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Login Successfully'
                  token:
                    type: string
                    example: 1|abc123def456...
                  user:
                    $ref: '#/components/schemas/User'
                type: object
        401:
          description: 'Invalid credentials'
          content:
            application/json:
              schema:
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'Invalid email or password.'
                type: object
        422:
          description: 'Validation error'
  /api/logout:
    post:
      tags:
        - Authentication
      summary: 'Logout a user'
      description: 'Invalidate the session and log out the authenticated user'
      operationId: logoutUser
      responses:
        200:
          description: 'Logged out successfully'
          content:
            application/json:
              schema:
                properties:
                  message:
                    type: string
                    example: 'Logged out successfully.'
                type: object
      security:
        -
          sanctum: []
  /api/profile:
    get:
      tags:
        - Authentication
      summary: 'Get authenticated user profile'
      description: 'Return the profile of the currently authenticated user'
      operationId: getProfile
      responses:
        200:
          description: 'Authenticated user data'
          content:
            application/json:
              schema:
                properties:
                  user:
                    $ref: '#/components/schemas/User'
                type: object
      security:
        -
          sanctum: []
    put:
      tags:
        - Authentication
      summary: 'Update authenticated user profile'
      description: 'Update the name and/or email of the currently authenticated user'
      operationId: updateProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - name
                - email
              properties:
                name:
                  type: string
                  example: 'John Doe'
                email:
                  type: string
                  format: email
                  example: john@example.com
              type: object
      responses:
        200:
          description: 'Profile updated successfully'
          content:
            application/json:
              schema:
                properties:
                  message:
                    type: string
                    example: 'Profile updated successfully.'
                  user:
                    $ref: '#/components/schemas/User'
                type: object
      security:
        -
          sanctum: []
  /api/password:
    put:
      tags:
        - Authentication
      summary: 'Change authenticated user password'
      description: 'Change the password for the currently authenticated user. All existing tokens are revoked.'
      operationId: changePassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - current_password
                - password
                - password_confirmation
              properties:
                current_password:
                  type: string
                  format: password
                  example: oldpassword123
                password:
                  type: string
                  format: password
                  example: newpassword123
                password_confirmation:
                  type: string
                  format: password
                  example: newpassword123
              type: object
      responses:
        200:
          description: 'Password changed successfully'
          content:
            application/json:
              schema:
                properties:
                  message:
                    type: string
                    example: 'Password changed successfully. Please log in again.'
                type: object
        422:
          description: 'Validation error or incorrect current password'
          content:
            application/json:
              schema:
                properties:
                  message:
                    type: string
                    example: 'Validation failed.'
                  errors:
                    type: object
                type: object
      security:
        -
          sanctum: []
  /api/cart:
    get:
      tags:
        - Cart
      summary: 'Get cart items'
      description: 'Retrieve all items in the cart for the authenticated user or guest.'
      operationId: cartIndex
      parameters:
        -
          name: guest_token
          in: query
          description: 'Guest token for unauthenticated users'
          required: false
          schema:
            type: string
      responses:
        200:
          description: 'Successful operation'
          content:
            application/json:
              schema:
                properties:
                  cart:
                    type: array
                    items:
                      $ref: '#/components/schemas/CartItem'
                  item_count:
                    type: integer
                  line_count:
                    type: integer
                  total:
                    type: number
                    format: float
                type: object
        401:
          description: Unauthenticated
    post:
      tags:
        - Cart
      summary: 'Add item to cart'
      description: 'Add a product to the cart. If the product already exists, the quantity is incremented.'
      operationId: cartStore
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - product_id
                - quantity
              properties:
                product_id:
                  description: 'Product ID'
                  type: integer
                quantity:
                  description: 'Quantity to add'
                  type: integer
                guest_token:
                  description: 'Guest token for unauthenticated users'
                  type: string
              type: object
      responses:
        201:
          description: 'Item added to cart'
          content:
            application/json:
              schema:
                properties:
                  message:
                    type: string
                  item:
                    $ref: '#/components/schemas/CartItem'
                type: object
        401:
          description: Unauthenticated
        422:
          description: 'Validation error'
    delete:
      tags:
        - Cart
      summary: 'Clear cart'
      description: 'Remove all items from the cart for the authenticated user or guest.'
      operationId: cartClear
      parameters:
        -
          name: guest_token
          in: query
          description: 'Guest token for unauthenticated users'
          required: false
          schema:
            type: string
      responses:
        200:
          description: 'Cart cleared'
          content:
            application/json:
              schema:
                properties:
                  message:
                    type: string
                    example: 'Cart cleared.'
                type: object
  '/api/cart/{cart}':
    put:
      tags:
        - Cart
      summary: 'Update cart item quantity'
      description: 'Update the quantity of a specific cart item.'
      operationId: cartUpdate
      parameters:
        -
          name: cart
          in: path
          description: 'Cart item ID'
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - quantity
              properties:
                quantity:
                  description: 'New quantity'
                  type: integer
              type: object
      responses:
        200:
          description: 'Cart item updated'
          content:
            application/json:
              schema:
                properties:
                  message:
                    type: string
                  item:
                    $ref: '#/components/schemas/CartItem'
                type: object
        404:
          description: 'Not found'
        422:
          description: 'Validation error'
    delete:
      tags:
        - Cart
      summary: 'Remove item from cart'
      description: 'Remove a specific item from the cart.'
      operationId: cartDestroy
      parameters:
        -
          name: cart
          in: path
          description: 'Cart item ID'
          required: true
          schema:
            type: integer
        -
          name: guest_token
          in: query
          description: 'Guest token for unauthenticated users'
          required: false
          schema:
            type: string
      responses:
        200:
          description: 'Item removed from cart'
          content:
            application/json:
              schema:
                properties:
                  message:
                    type: string
                    example: 'Item removed from cart.'
                type: object
        404:
          description: 'Not found'
  /api/cart/merge:
    post:
      tags:
        - Cart
      summary: 'Merge guest cart into user cart'
      description: "Merge a guest cart into the authenticated user's cart after login."
      operationId: cartMerge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - guest_token
              properties:
                guest_token:
                  description: 'Guest token to merge'
                  type: string
              type: object
      responses:
        200:
          description: 'Cart merged successfully'
          content:
            application/json:
              schema:
                properties:
                  message:
                    type: string
                    example: 'Cart merged successfully.'
                type: object
        401:
          description: Unauthenticated
        400:
          description: 'Bad request'
      security:
        -
          sanctum: []
  /api/checkout:
    post:
      tags:
        - Orders
      summary: 'Checkout and create order'
      description: "Convert the authenticated user's cart into an order. Validates stock, creates order items, decrements stock, and clears the cart."
      operationId: orderCheckout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - shipping_address
                - payment_method
              properties:
                shipping_address:
                  description: 'Shipping address'
                  type: string
                payment_method:
                  description: 'Payment method'
                  type: string
                  enum:
                    - cash_on_delivery
                    - credit_card
                    - paypal
              type: object
      responses:
        201:
          description: 'Order placed successfully'
          content:
            application/json:
              schema:
                properties:
                  message:
                    type: string
                  order:
                    $ref: '#/components/schemas/Order'
                type: object
        401:
          description: Unauthenticated
        422:
          description: 'Validation error'
      security:
        -
          sanctum: []
  /api/orders:
    get:
      tags:
        - Orders
      summary: 'List user orders'
      description: 'Retrieve paginated order history for the authenticated user.'
      operationId: orderIndex
      responses:
        200:
          description: 'Successful operation'
          content:
            application/json:
              schema:
                properties:
                  orders:
                    type: array
                    items:
                      $ref: '#/components/schemas/Order'
                  meta:
                    properties:
                      current_page:
                        type: integer
                      last_page:
                        type: integer
                      total:
                        type: integer
                    type: object
                type: object
        401:
          description: Unauthenticated
      security:
        -
          sanctum: []
  '/api/orders/{order}':
    get:
      tags:
        - Orders
      summary: 'Get order details'
      description: 'Retrieve full details of a specific order including all items.'
      operationId: orderShow
      parameters:
        -
          name: order
          in: path
          description: 'Order ID'
          required: true
          schema:
            type: integer
      responses:
        200:
          description: 'Successful operation'
          content:
            application/json:
              schema:
                properties:
                  order:
                    $ref: '#/components/schemas/Order'
                type: object
        401:
          description: Unauthenticated
        404:
          description: 'Not found'
      security:
        -
          sanctum: []
  '/api/orders/{order}/cancel':
    put:
      tags:
        - Orders
      summary: 'Cancel an order'
      description: 'Cancel a pending order and restore stock for each item.'
      operationId: orderCancel
      parameters:
        -
          name: order
          in: path
          description: 'Order ID'
          required: true
          schema:
            type: integer
      responses:
        200:
          description: 'Order cancelled'
          content:
            application/json:
              schema:
                properties:
                  message:
                    type: string
                  order:
                    $ref: '#/components/schemas/Order'
                type: object
        401:
          description: Unauthenticated
        404:
          description: 'Not found'
        422:
          description: 'Validation error'
      security:
        -
          sanctum: []
  /api/categories:
    get:
      tags:
        - Products
      operationId: e6c33282ef4a382eeafa86cce761fb84
      responses:
        200:
          description: 'List of categories with products count'
          content:
            application/json:
              schema:
                properties:
                  categories:
                    type: array
                    items:
                      $ref: '#/components/schemas/Category'
                type: object
  /api/filters:
    get:
      tags:
        - Products
      operationId: 79f78ff657e97f5f1d675cd8896afe5a
      responses:
        200:
          description: 'Filter options'
          content:
            application/json:
              schema:
                properties:
                  genders:
                    type: array
                    items:
                      type: string
                  brands:
                    type: array
                    items:
                      type: string
                  types:
                    type: array
                    items:
                      type: string
                  departments:
                    type: array
                    items:
                      type: string
                type: object
  /api/products:
    get:
      tags:
        - Products
      operationId: 7cd9d394f726672223f216b77acab086
      parameters:
        -
          name: search
          in: query
          description: 'Search term'
          schema:
            type: string
        -
          name: category_id
          in: query
          description: 'Category ID'
          schema:
            type: integer
        -
          name: gender
          in: query
          description: 'Gender filter (comma-separated)'
          schema:
            type: string
        -
          name: brand
          in: query
          description: 'Brand filter (comma-separated)'
          schema:
            type: string
        -
          name: type
          in: query
          description: 'Type filter (comma-separated)'
          schema:
            type: string
        -
          name: department
          in: query
          description: 'Department filter (comma-separated)'
          schema:
            type: string
        -
          name: max_price
          in: query
          description: 'Maximum price'
          schema:
            type: number
        -
          name: in_stock
          in: query
          description: 'Filter by stock availability'
          schema:
            type: boolean
        -
          name: is_new
          in: query
          description: 'Filter by new arrivals'
          schema:
            type: boolean
        -
          name: sort
          in: query
          description: 'Sort order'
          schema:
            type: string
            enum:
              - newest
              - price_asc
              - price_desc
              - name_asc
              - rating
        -
          name: per_page
          in: query
          description: 'Items per page'
          schema:
            type: integer
        -
          name: page
          in: query
          description: 'Page number'
          schema:
            type: integer
      responses:
        200:
          description: 'Paginated product list'
          content:
            application/json:
              schema:
                properties:
                  products:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProductListItem'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
                type: object
  '/api/products/{product}':
    get:
      tags:
        - Products
      operationId: 7cdbe003eaaf28a4f74ce2d612778cd7
      parameters:
        -
          name: product
          in: path
          description: 'Product ID'
          required: true
          schema:
            type: integer
      responses:
        200:
          description: 'Product detail with reviews and related products'
          content:
            application/json:
              schema:
                properties:
                  product:
                    $ref: '#/components/schemas/Product'
                type: object
        404:
          description: 'Product not found'
  /api/promotions:
    get:
      tags:
        - Promotions
      summary: 'List promotions'
      description: 'Retrieve all active promotions. Publicly accessible.'
      operationId: promotionIndex
      responses:
        200:
          description: 'Successful operation'
          content:
            application/json:
              schema:
                properties:
                  promotions:
                    type: array
                    items:
                      $ref: '#/components/schemas/Promotion'
                type: object
  '/api/promotions/{promotion}':
    get:
      tags:
        - Promotions
      summary: 'Get promotion details'
      description: 'Retrieve a specific promotion by ID. Publicly accessible.'
      operationId: promotionShow
      parameters:
        -
          name: promotion
          in: path
          description: 'Promotion ID'
          required: true
          schema:
            type: integer
      responses:
        200:
          description: 'Successful operation'
          content:
            application/json:
              schema:
                properties:
                  promotion:
                    $ref: '#/components/schemas/Promotion'
                type: object
        404:
          description: 'Not found'
  /api/promotions/validate:
    post:
      tags:
        - Promotions
      summary: 'Validate a coupon code'
      description: 'Check whether a coupon code is valid and active.'
      operationId: promotionValidate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - coupon_code
              properties:
                coupon_code:
                  description: 'Coupon code to validate'
                  type: string
              type: object
      responses:
        200:
          description: 'Coupon is valid'
          content:
            application/json:
              schema:
                properties:
                  valid:
                    type: boolean
                  promotion:
                    $ref: '#/components/schemas/Promotion'
                  message:
                    type: string
                type: object
        404:
          description: 'Invalid or expired coupon'
        422:
          description: 'Validation error'
  '/api/products/{product}/reviews':
    get:
      tags:
        - Reviews
      summary: 'List product reviews'
      description: 'Retrieve paginated reviews for a specific product. Publicly accessible.'
      operationId: reviewIndex
      parameters:
        -
          name: product
          in: path
          description: 'Product ID'
          required: true
          schema:
            type: integer
      responses:
        200:
          description: 'Successful operation'
          content:
            application/json:
              schema:
                properties:
                  product_id:
                    type: integer
                  product_name:
                    type: string
                  rating_avg:
                    type: number
                    format: float
                    nullable: true
                  rating_count:
                    type: integer
                  reviews:
                    type: array
                    items:
                      $ref: '#/components/schemas/Review'
                  meta:
                    properties:
                      current_page:
                        type: integer
                      last_page:
                        type: integer
                      total:
                        type: integer
                    type: object
                type: object
        404:
          description: 'Product not found'
    post:
      tags:
        - Reviews
      summary: 'Create a review'
      description: 'Submit a rating and comment for a product. One review per user per product.'
      operationId: reviewStore
      parameters:
        -
          name: product
          in: path
          description: 'Product ID'
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - rating
              properties:
                rating:
                  description: 'Rating 1-5'
                  type: integer
                  maximum: 5
                  minimum: 1
                comment:
                  description: 'Review comment'
                  type: string
                  nullable: true
              type: object
      responses:
        201:
          description: 'Review submitted successfully'
          content:
            application/json:
              schema:
                properties:
                  message:
                    type: string
                  review:
                    $ref: '#/components/schemas/Review'
                type: object
        401:
          description: Unauthenticated
        422:
          description: 'Validation error'
      security:
        -
          sanctum: []
  '/api/products/{product}/reviews/{review}':
    put:
      tags:
        - Reviews
      summary: 'Update a review'
      description: 'Update the rating and/or comment of your own review.'
      operationId: reviewUpdate
      parameters:
        -
          name: product
          in: path
          description: 'Product ID'
          required: true
          schema:
            type: integer
        -
          name: review
          in: path
          description: 'Review ID'
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - rating
              properties:
                rating:
                  description: 'Rating 1-5'
                  type: integer
                  maximum: 5
                  minimum: 1
                comment:
                  description: 'Review comment'
                  type: string
                  nullable: true
              type: object
      responses:
        200:
          description: 'Review updated successfully'
          content:
            application/json:
              schema:
                properties:
                  message:
                    type: string
                  review:
                    $ref: '#/components/schemas/Review'
                type: object
        401:
          description: Unauthenticated
        403:
          description: 'Forbidden — not your review'
        404:
          description: 'Not found'
        422:
          description: 'Validation error'
      security:
        -
          sanctum: []
    delete:
      tags:
        - Reviews
      summary: 'Delete a review'
      description: 'Delete your own review. Only the review author can delete.'
      operationId: reviewDestroy
      parameters:
        -
          name: product
          in: path
          description: 'Product ID'
          required: true
          schema:
            type: integer
        -
          name: review
          in: path
          description: 'Review ID'
          required: true
          schema:
            type: integer
      responses:
        200:
          description: 'Review deleted'
          content:
            application/json:
              schema:
                properties:
                  message:
                    type: string
                    example: 'Your review has been deleted.'
                type: object
        401:
          description: Unauthenticated
        403:
          description: 'Forbidden — not your review'
        404:
          description: 'Not found'
        422:
          description: 'Validation error'
      security:
        -
          sanctum: []
  /api/wishlist:
    get:
      tags:
        - Wishlist
      summary: 'Get wishlist items'
      description: 'Retrieve all items in the wishlist for the authenticated user or guest.'
      operationId: wishlistIndex
      parameters:
        -
          name: guest_token
          in: query
          description: 'Guest token for unauthenticated users'
          required: false
          schema:
            type: string
      responses:
        200:
          description: 'Successful operation'
          content:
            application/json:
              schema:
                properties:
                  wishlist:
                    type: array
                    items:
                      $ref: '#/components/schemas/WishlistItem'
                  count:
                    type: integer
                type: object
        401:
          description: Unauthenticated
    post:
      tags:
        - Wishlist
      summary: 'Add item to wishlist'
      description: 'Add a product to the wishlist.'
      operationId: wishlistStore
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - product_id
              properties:
                product_id:
                  description: 'Product ID'
                  type: integer
                guest_token:
                  description: 'Guest token for unauthenticated users'
                  type: string
              type: object
      responses:
        201:
          description: 'Item added to wishlist'
          content:
            application/json:
              schema:
                properties:
                  message:
                    type: string
                  wishlist_id:
                    type: integer
                  wishlisted:
                    type: boolean
                type: object
        200:
          description: 'Item already in wishlist'
        401:
          description: Unauthenticated
        422:
          description: 'Validation error'
  /api/wishlist/toggle:
    post:
      tags:
        - Wishlist
      summary: 'Toggle wishlist item'
      description: 'Add or remove a product from the wishlist. If it exists, remove it; if not, add it.'
      operationId: wishlistToggle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - product_id
              properties:
                product_id:
                  description: 'Product ID'
                  type: integer
                guest_token:
                  description: 'Guest token for unauthenticated users'
                  type: string
              type: object
      responses:
        200:
          description: 'Item removed from wishlist'
          content:
            application/json:
              schema:
                properties:
                  message:
                    type: string
                  wishlisted:
                    type: boolean
                type: object
        201:
          description: 'Item added to wishlist'
          content:
            application/json:
              schema:
                properties:
                  message:
                    type: string
                  wishlisted:
                    type: boolean
                type: object
        401:
          description: Unauthenticated
        422:
          description: 'Validation error'
  '/api/wishlist/{wishlist}':
    delete:
      tags:
        - Wishlist
      summary: 'Remove item from wishlist'
      description: 'Remove a specific item from the wishlist.'
      operationId: wishlistDestroy
      parameters:
        -
          name: wishlist
          in: path
          description: 'Wishlist item ID'
          required: true
          schema:
            type: integer
        -
          name: guest_token
          in: query
          description: 'Guest token for unauthenticated users'
          required: false
          schema:
            type: string
      responses:
        200:
          description: 'Item removed from wishlist'
          content:
            application/json:
              schema:
                properties:
                  message:
                    type: string
                    example: 'Removed from your wishlist'
                  wishlisted:
                    type: boolean
                type: object
        404:
          description: 'Not found'
  /api/wishlist/merge:
    post:
      tags:
        - Wishlist
      summary: 'Merge guest wishlist into user wishlist'
      description: "Merge a guest wishlist into the authenticated user's wishlist after login."
      operationId: wishlistMerge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - guest_token
              properties:
                guest_token:
                  description: 'Guest token to merge'
                  type: string
              type: object
      responses:
        200:
          description: 'Wishlist merged successfully'
          content:
            application/json:
              schema:
                properties:
                  message:
                    type: string
                    example: 'Your wishlist has been merged.'
                type: object
        401:
          description: Unauthenticated
        400:
          description: 'Bad request'
      security:
        -
          sanctum: []
